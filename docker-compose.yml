version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - API_PORT=5174
    command: sh -c "npm install --no-audit --no-fund && npm run dev:server"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - api
    command: sh -c "npm install --no-audit --no-fund && npm run dev:client"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
