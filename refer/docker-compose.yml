version: '3.8'
services:
  api:
    build:
      context: ./api
    volumes:
      - ./basedata:/data:ro
      - ./basedata.db:/app/basedata.db:ro
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - '8000:8000'

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    env_file:
      - .env.local
    environment: {}
    # No host port binding for `web` — Caddy will serve HTTPS on host:3000
    depends_on:
      - api
    # No host bind for web to preserve installed node_modules in image

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
